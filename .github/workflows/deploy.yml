name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the app directory (ensure this path exists on your server)
            cd /path/to/your/app/poke-wechat-starter
            
            # Pull the latest changes
            git pull origin main
            
            # Navigate to backend and install dependencies
            cd backend
            npm install
            
            # Restart or start the app with PM2
            # Assumes the app is named 'poke-backend' in PM2
            pm2 restart poke-backend || pm2 start server.js --name poke-backend
